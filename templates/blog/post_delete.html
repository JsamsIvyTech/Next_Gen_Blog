{% extends 'base.html' %}

{% block title %}Delete Post | {{ post.title }}{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto; text-align: center;">
    <div class="card" style="border-color: #ef4444;">
        <h1 style="color: #ef4444; margin-bottom: 1rem;"><i class="fas fa-exclamation-triangle"></i></h1>
        <h2>Are you sure?</h2>
        <p style="color: var(--text-secondary); margin: 1rem 0 2rem 0;">
            You are about to delete <strong>"{{ post.title }}"</strong>. This action cannot be undone.
        </p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-premium"
                style="background: #ef4444; width: 100%; margin-bottom: 1rem;">Yes, Delete Post</button>
            <a href="{% url 'post-detail' post.slug %}" style="display: block; color: var(--text-secondary);">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
